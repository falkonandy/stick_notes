{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="{% static 'notes/style.css' %}" />
    <title>
      {% block title %}
        Sticky Notes
      {% endblock %}
    </title>
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a class="site-logo" href="{% url 'note_list' %}">Sticky Notes</a>
        <nav class="site-nav">
          <a href="{% url 'note_list' %}">All Notes</a>
          <a href="{% url 'note_create' %}" class="btn btn-primary">+ New Note</a>
        </nav>
      </div>
    </header>

    <main class="site-main">
      {% if messages %}
        <div class="messages">
          {% for msg in messages %}
            <div class="message message--{{ msg.tags }}">{{ msg }}</div>
          {% endfor %}
        </div>
      {% endif %}

      {% block content %}

      {% endblock %}
    </main>

    <footer class="site-footer">
      <p>Sticky Notes &copy; 2026 &mdash; Built with Django</p>
    </footer>
  </body>
</html>
